debug = true

[http_server]
  enabled = true
  address = "0.0.0.0"
  port = 2009
  template_dir = "./assets/templates/"
  assets_dir = "./assets/"
  [http_server.tls_configuration]
    enable = false
    cert_file = "cert.pem"
    key_file = "key.pem"

[database]
  [database.sqlite_configuration]
    enabled = true
    database_location = "db.sqlite"
  [database.embedded_redis_configuration]
    enabled = true
  [database.mysql_configuration]
    enabled = false
    hostname = "127.0.0.1"
    port = 3306
    username = "root"
    password = ""
    database = "GinWrapper"
    tls_enabled = true
    skip_tls_verification = true
    charset = "utf8mb4"
    max_open_connections = 151
    max_idle_connections = 10
    connections_max_lifetime_seconds = 3600
    parse_time = true
  [database.redis_configuration]
    enabled = false
    hostname = "127.0.0.1"
    port = 6379
    username = "root"
    password = ""
    database = 0
    pool_size = 20
    min_idle_connections = 0
    max_retries = 5
    pool_timeout = 1
    dial_timeout = 1
    read_timeout = 2
    write_timeout_sec = 3
    tls_enabled = true
    skip_tls_verification = true

[protections]
  user_pass_api = true
  api_user_agent = "Test Client 1.0/b (Software)"
  [protections.basic_protections]
    provide = true
    aggressive = true
  [protections.jwt_protection]
    jwt_secret = "ggBSU8RsEUz2KiZ6_JLEiIGDFxg839XMtE501K9f5Nw="
    jwt_expiration = 60
  [protections.ordering_protection]
    enabled = true
    [protections.ordering_protection.orders]
      "/auth" = ["/", "/home"]
      "/dashboard" = ["/auth"]
